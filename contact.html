<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 — 3DEXPERIENCE & V5 MCP</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        .contact-hero {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 24px 80px;
            background: var(--color-bg);
        }
        .contact-card {
            text-align: center;
            max-width: 640px;
            width: 100%;
        }
        .contact-card h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 8px;
        }
        .contact-card > p {
            font-size: 15px;
            color: var(--color-text-secondary);
            margin-bottom: 40px;
        }
        .qrcode-grid {
            display: flex;
            gap: 32px;
            justify-content: center;
        }
        @media (max-width: 560px) {
            .qrcode-grid {
                flex-wrap: wrap;
            }
        }
        .qrcode-item {
            text-align: center;
        }
        .qrcode-wrapper {
            display: inline-block;
            padding: 24px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            transition: box-shadow 0.2s;
        }
        .qrcode-wrapper:hover {
            box-shadow: var(--shadow-xl);
        }
        .qrcode-wrapper img {
            width: 200px;
            height: 200px;
            display: block;
            border-radius: var(--radius-md);
        }
        .qrcode-label {
            margin-top: 14px;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text);
        }
        .qrcode-hint {
            margin-top: 6px;
            font-size: 13px;
            color: var(--color-text-muted);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 40px;
            font-size: 14px;
            color: var(--color-primary);
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--color-primary-hover);
        }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <!-- ===== Contact Hero ===== -->
    <section class="contact-hero">
        <div class="contact-card">
            <h1>联系我们</h1>
            <p>扫码添加微信或关注公众号，获取技术支持与最新动态</p>
            <div class="qrcode-grid">
                <div class="qrcode-item">
                    <div class="qrcode-wrapper">
                        <img src="cont/wechat.jpg" alt="微信二维码">
                    </div>
                    <div class="qrcode-label">个人微信</div>
                    <p class="qrcode-hint">打开微信 → 扫一扫 → 添加好友</p>
                </div>
                <div class="qrcode-item">
                    <div class="qrcode-wrapper">
                        <img src="cont/wechat-gzh.jpg" alt="微信公众号二维码">
                    </div>
                    <div class="qrcode-label">微信公众号</div>
                    <p class="qrcode-hint">打开微信 → 扫一扫 → 关注公众号</p>
                </div>
            </div>
            <br>
            <a href="index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                返回首页
            </a>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
