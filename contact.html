<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 — 3DEXPERIENCE & V5 MCP</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        .contact-hero {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 24px 80px;
            background: var(--color-bg);
        }
        .contact-card {
            text-align: center;
            max-width: 420px;
            width: 100%;
        }
        .contact-card h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 8px;
        }
        .contact-card > p {
            font-size: 15px;
            color: var(--color-text-secondary);
            margin-bottom: 40px;
        }
        .qrcode-wrapper {
            display: inline-block;
            padding: 24px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            transition: box-shadow 0.2s;
        }
        .qrcode-wrapper:hover {
            box-shadow: var(--shadow-xl);
        }
        .qrcode-wrapper img {
            width: 240px;
            height: 240px;
            display: block;
            border-radius: var(--radius-md);
        }
        .qrcode-hint {
            margin-top: 16px;
            font-size: 13px;
            color: var(--color-text-muted);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 40px;
            font-size: 14px;
            color: var(--color-primary);
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--color-primary-hover);
        }
    </style>
</head>
<body>

    <!-- ===== Navigation ===== -->
    <nav class="nav">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="nav-title">3DEXPERIENCE & AI</span>
            </div>
            <div class="nav-links">
                <a href="index.html#features">核心能力</a>
                <a href="index.html#quickstart">快速接入</a>
                <a href="index.html#examples">使用示例</a>
                <a href="docs.html" class="nav-link-docs">开发文档</a>
            </div>
            <button class="btn-nav-cta">控制台</button>
            <button class="mobile-menu-btn" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- ===== Contact Hero ===== -->
    <section class="contact-hero">
        <div class="contact-card">
            <h1>联系我们</h1>
            <p>扫码添加微信，获取技术支持与最新动态</p>
            <div class="qrcode-wrapper">
                <img src="cont/wechat.jpg" alt="微信二维码">
            </div>
            <p class="qrcode-hint">打开微信 → 扫一扫 → 添加好友</p>
            <br>
            <a href="index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                返回首页
            </a>
        </div>
    </section>

    <!-- ===== Footer ===== -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-grid">
                <div class="footer-col footer-col-brand">
                    <div class="footer-brand">
                        <span>3DEXPERIENCE / V5 MCP</span>
                    </div>
                </div>

                <div class="footer-col">
                    <h4>开发者</h4>
                    <a href="index.html#quickstart">快速接入</a>
                    <a href="docs.html">工具列表</a>
                    <a href="docs.html">API 文档</a>
                    <a href="#">GitHub</a>
                </div>

                <div class="footer-col">
                    <h4>支持</h4>
                    <a href="index.html#faq">常见问题</a>
                    <a href="#">社区讨论</a>
                    <a href="contact.html">联系我们</a>
                </div>
            </div>

            <div class="footer-bottom">
                <span>&copy; 2026 3DEXPERIENCE / V5 MCP. CATIA is a registered trademark of Dassault Systèmes.</span>
                <div class="footer-bottom-links">
                    <a href="#">隐私政策</a>
                    <a href="#">服务条款</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
